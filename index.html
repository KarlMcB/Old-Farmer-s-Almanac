<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Almanac</title>
  <style>
    :root {
      --paper: #f5edd5;
      --ink: #1a1008;
      --ink-muted: #5a3e20;
      --rule: #3a2810;
      --row-alt: rgba(0,0,0,0.03);
      --accent: #7a2f18;
      --blue: #1a4f7a;
      --green: #2a5a1a;
    }
    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(180deg, #c3ac7b 0%, #9f8455 100%);
      min-height: 100vh;
    }

    /* ── Control bar ─────────────────────────────────────── */
    .app-shell { padding: 20px; }

    .control-bar {
      position: sticky; top: 0; z-index: 10;
      display: flex; flex-wrap: wrap; gap: 10px;
      align-items: center; justify-content: space-between;
      margin: 0 auto 20px; padding: 13px 18px;
      max-width: 1000px;
      border: 1px solid rgba(70,45,18,0.24);
      border-radius: 16px;
      background: rgba(245,236,214,0.93);
      box-shadow: 0 10px 28px rgba(58,35,9,0.18);
      backdrop-filter: blur(10px);
    }
    .control-copy h1 { margin:0; font-size:clamp(1.1rem,2.5vw,1.7rem); letter-spacing:.04em; text-transform:uppercase; }
    .control-copy p  { margin:3px 0 0; color:var(--ink-muted); font-size:.85rem; }
    .controls, .location-row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    .location-row { flex:0 0 100%; padding-top:9px; margin-top:2px; border-top:1px solid rgba(70,45,18,0.14); }
    label { font-size:.85rem; color:var(--ink-muted); }
    input, select, button { border:1px solid rgba(76,51,25,0.28); border-radius:999px; font:inherit; }
    input  { width:100px; padding:7px 12px; background:rgba(255,250,238,0.95); color:var(--ink); }
    #cityInput { width:190px; }
    select { padding:7px 12px; background:rgba(255,250,238,0.95); color:var(--ink); cursor:pointer; }
    button { padding:7px 13px; color:#fff8eb; background:linear-gradient(180deg,#9d6b35,#7f5223); cursor:pointer; box-shadow:0 5px 14px rgba(75,44,14,0.18); transition:transform 130ms; }
    button:hover { transform:translateY(-1px); }
    button.secondary { color:var(--ink); background:rgba(255,247,230,0.9); box-shadow:none; }
    .station-label { font-size:.8rem; color:var(--ink-muted); font-style:italic; }

    /* ── Almanac spread ──────────────────────────────────── */
    .pages { max-width: 1000px; margin: 0 auto; }
    .almanac-spread { border:2px solid var(--ink); background:var(--paper); overflow:hidden; }

    /* ── TOP SECTION ─────────────────────────────────────── */
    .alm-top { padding:16px 22px 12px; border-bottom:3px double var(--rule); }

    .alm-month-title {
      text-align:center; font-size:2.9rem; font-weight:700;
      letter-spacing:.32em; text-transform:uppercase;
      border-top:2px solid var(--ink); border-bottom:2px solid var(--ink);
      padding:4px 0; margin-bottom:10px;
    }

    .sky-watch-box {
      border:1px solid var(--ink); padding:7px 11px; margin-bottom:8px;
      font-size:.74rem; line-height:1.46;
      column-count:2; column-gap:16px;
    }
    .sky-label { font-weight:700; font-size:.74rem; letter-spacing:.06em; text-transform:uppercase; }

    .moon-phases-bar {
      display:flex; flex-wrap:wrap; gap:10px 18px; justify-content:center;
      font-size:.7rem; padding:4px 0;
      border-top:1px solid var(--rule); border-bottom:1px solid var(--rule);
      margin-bottom:5px;
    }
    .phase-item { display:flex; align-items:center; gap:5px; }
    .ph-glyph { font-size:.95rem; }
    .phase-note { text-align:center; font-size:.62rem; font-style:italic; color:var(--ink-muted); margin-bottom:5px; }

    /* Dense table */
    .astro-wrap { overflow-x:auto; }
    .astro-table {
      width:100%; border-collapse:collapse;
      font-size:.67rem; min-width:580px;
    }
    .astro-table thead th {
      border:1px solid #888; padding:2px 4px;
      text-align:center; font-size:.57rem; font-weight:700;
      text-transform:uppercase; letter-spacing:.04em;
      background:rgba(0,0,0,0.07); line-height:1.2; white-space:nowrap;
    }
    .astro-table tbody td {
      border:1px solid #bbb; padding:1px 4px;
      text-align:center; white-space:nowrap; line-height:1.3;
    }
    .astro-table tbody tr:nth-child(even) td { background:var(--row-alt); }
    .astro-table tbody tr.is-sunday td { font-weight:700; }
    .astro-table tbody tr.is-sunday .col-dow { color:var(--accent); }
    .astro-table tbody tr.is-today td { background:rgba(157,107,53,0.13); }
    .col-dy  { color:var(--ink-muted); font-size:.63rem; }
    .col-num { font-weight:700; }
    .col-dow { font-style:italic; }
    .col-decl { font-size:.62rem; color:var(--ink-muted); }
    .col-moon { font-size:.92rem; }
    .col-tide { color:var(--blue); }
    .col-const { font-size:.62rem; color:var(--ink-muted); letter-spacing:.04em; }

    /* ── BOTTOM SECTION ──────────────────────────────────── */
    .alm-bottom { padding:13px 22px 20px; }

    .alm-bottom-header {
      display:flex; justify-content:space-between; align-items:baseline;
      border-top:2px solid var(--ink); border-bottom:2px solid var(--ink);
      padding:3px 0; margin-bottom:9px;
      font-size:.63rem; letter-spacing:.12em; text-transform:uppercase;
    }
    .bh-month { font-size:1.55rem; font-weight:700; letter-spacing:.18em; line-height:1; }

    .alm-ornament { text-align:center; margin:4px 0; color:var(--ink-muted); letter-spacing:.5em; font-size:1.1rem; }
    .alm-verse { text-align:center; font-style:italic; font-size:.74rem; line-height:1.55; margin:4px 0 12px; }

    .alm-two-col { display:grid; grid-template-columns:1.65fr 1fr; gap:18px; align-items:start; }

    .dates-col-head, .farmers-col-head {
      font-size:.57rem; font-weight:700; letter-spacing:.1em;
      text-transform:uppercase; text-align:center;
      border-bottom:1px solid var(--ink); padding-bottom:3px; margin-bottom:4px;
    }

    .dates-table { width:100%; border-collapse:collapse; font-size:.68rem; }
    .dates-table td { padding:1px 3px; vertical-align:top; line-height:1.35; }
    .dt-num  { font-weight:700; text-align:right; min-width:17px; padding-right:2px; }
    .dt-dow  { color:var(--ink-muted); font-style:italic; min-width:22px; }
    .dt-dot  { color:var(--ink-muted); width:10px; }
    .dt-event { color:var(--ink); }
    .ev-holiday { font-weight:700; color:var(--accent); }
    .ev-season  { font-weight:700; color:var(--green); }
    .ev-phase   { font-weight:700; }
    .dt-tide { text-align:right; font-size:.61rem; color:var(--blue); white-space:nowrap; padding-left:4px; }
    .dates-table tr.dt-sunday .dt-num { color:var(--accent); }
    .dates-table tr.dt-today td { background:rgba(157,107,53,0.12); }

    .farmers-text { font-size:.73rem; line-height:1.56; text-align:justify; color:var(--ink); }
    .farmers-text p { margin:0 0 7px; }
    .farmers-text p:last-child { margin-bottom:0; }

    .alm-footer {
      margin-top:11px; padding-top:4px; border-top:1px solid var(--rule);
      display:flex; justify-content:space-between;
      font-size:.59rem; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-muted);
    }

    @media (max-width:680px) {
      .sky-watch-box { column-count:1; }
      .alm-two-col { grid-template-columns:1fr; }
    }
    @media print {
      body { background:#fff; }
      .app-shell { padding:0; }
      .control-bar { display:none; }
      .almanac-spread { border:none; }
      .alm-top { page-break-after:always; }
    }
  </style>
</head>
<body>
<div class="app-shell">
  <section class="control-bar">
    <div class="control-copy">
      <h1>Old Farmer's Almanac</h1>
      <p>Classic almanac-style calendar for any month and year.</p>
    </div>
    <div class="controls">
      <label for="monthSelect">Month</label>
      <select id="monthSelect">
        <option value="0">January</option><option value="1">February</option>
        <option value="2">March</option><option value="3">April</option>
        <option value="4">May</option><option value="5">June</option>
        <option value="6">July</option><option value="7">August</option>
        <option value="8">September</option><option value="9">October</option>
        <option value="10">November</option><option value="11">December</option>
      </select>
      <label for="yearInput">Year</label>
      <input id="yearInput" type="number" min="1" max="9999" step="1">
      <button id="generateBtn">Generate</button>
      <button id="currentBtn" class="secondary">Today</button>
      <button id="printBtn" class="secondary">Print</button>
    </div>
    <div class="location-row">
      <label for="cityInput">Tides for</label>
      <input id="cityInput" type="text" placeholder="e.g. Boston, MA">
      <button id="tidesBtn">Find Tides</button>
      <button id="clearTidesBtn" class="secondary">Clear</button>
      <span id="stationLabel" class="station-label">No tide station set — set a location to show sun times &amp; tides</span>
    </div>
  </section>
  <main id="pages" class="pages" aria-live="polite"></main>
</div>
<script>
// ── Constants ────────────────────────────────────────────────
const monthNames = ["January","February","March","April","May","June",
  "July","August","September","October","November","December"];
const monthOrdinals = ["First","Second","Third","Fourth","Fifth","Sixth",
  "Seventh","Eighth","Ninth","Tenth","Eleventh","Twelfth"];
const dayAbbr = ["Su.","M.","Tu.","W.","Th.","Fr.","Sa."];

const skyWatch = [
  "Orion strides high in the south on January nights, his belt pointing to brilliant Sirius. The Pleiades ride near the zenith at nightfall. Watch for Venus low in the west after sunset. The Quadrantid meteors peak in early January — best before dawn from a dark site.",
  "February nights offer superb transparency. Sirius, the brightest star, glitters low in the southeast. The winter hexagon — Sirius, Rigel, Aldebaran, Capella, Pollux, and Procyon — spans the whole evening sky. The zodiacal light appears in the west on clear, moonless evenings near month's end.",
  "March brings the vernal equinox, balancing day and night. Orion retreats westward as Leo climbs in the east. Spring evenings reward binocular sweeps through the Virgo and Leo galaxy clusters. The first hints of Scorpius appear low in the southeast before dawn.",
  "April evenings find Leo overhead and Virgo rising in the east. Arcturus burns orange in the east — brightest northern star. The Lyrid meteors peak around the 22nd. Saturn rises after midnight and is well-placed for telescopes. Scan the Beehive Cluster in Cancer with binoculars.",
  "May brings shorter nights and warmer skies. Scorpius and red Antares rise in the southeast. The Virgo galaxy cluster rewards patient telescope work. The Eta Aquarid meteors peak around the 6th — remnants of Halley's Comet, best seen before dawn.",
  "June brings the summer solstice and the year's briefest nights. Scorpius arcs across the south, Sagittarius follows — both pointing toward the galactic center. The Summer Triangle climbs in the east. Noctilucent clouds shimmer at high northern latitudes after dusk.",
  "July nights offer the Milky Way at its finest, sweeping from Scorpius through Sagittarius and Aquila to Cygnus overhead. The Summer Triangle reigns at the zenith. The Delta Aquarid shower peaks in late July. This is the prime month for observing rich southern star fields.",
  "August brings the celebrated Perseid shower, peaking around the 11th–13th with up to 100 meteors per hour under dark skies. The Milky Way still spans the overhead sky. Saturn near opposition glows steadily and rewards any telescope. Warm nights bring stable seeing for planetary work.",
  "September's equinox returns equal day and night. The Great Square of Pegasus climbs in the east. The Andromeda Galaxy is visible to the naked eye on clear nights. Neptune can be found in binoculars near opposition. Summer's Triangle descends, yielding the sky to autumn constellations.",
  "October evenings feature the Great Square near the zenith and Andromeda at its best. Perseus climbs in the northeast. The Orionid meteors peak around the 21st. Jupiter near opposition rises at sunset and dominates the night. The Milky Way still spans the western sky on early evenings.",
  "November's long cold nights invite deep observing. Orion clears the eastern horizon by 9 p.m. The Pleiades and Hyades rise together. The Leonid shower peaks around the 17th. Mars glows distinctly orange-red when visible. Cold, dry air often brings the year's finest transparency.",
  "December nights are the longest of the year. Orion rises in the east by 8 p.m. The Geminid shower, the year's finest, peaks around the 13th–14th with up to 120 meteors per hour. The solstice on the 21st brings the longest night and shortest day of the year."
];

const monthVerses = [
  "Frost-bound and silent, the meadow lies white;\nthe stars burn clear on a cold January night.",
  "Short February, sharp and spare —\nthe year turns young in frigid air.",
  "In March the soil stirs, the sap ascends;\nwhat winter locked, the warm rain bends.",
  "April showers and April sun:\nhalf the farmer's work begun.",
  "When May unlocks her blossomed gate,\nthe beekeeper rises early and works late.",
  "June brings the longest-lasting light;\neach hour precious, morning to night.",
  "From isle to isle the fisher's bark,\nlike fairy meteor, seems to glide.\n— Susanna Strickland Moodie",
  "The harvest moon hangs full and round;\nthe barn fills up with summer's ground.",
  "September's morning, sharp and bright —\nan apple-red, a hawk in flight.",
  "In October let the ax ring clear;\nthe woodpile now, or cold to fear.",
  "November knits a pewter sky;\nthe roots lie deep, the cellars high.",
  "December, shortest, darkest, best:\nthe hearth earns now its long-earned rest."
];

const farmersCalendar = [
  "January calls for mending harness and sharpening tools. The woodpile deserves attention — better too much than too little before February storms. Seed catalogs arrive this month, a welcome antidote to cold evenings. Review last season's notes. Order seeds early; the best varieties sell out by February.",
  "Tap the sugar maples when nights fall below freezing and afternoons climb above it. Prune apple and pear trees on mild, dry days before the buds swell. Start onion and leek seedlings under lights indoors. The hens begin laying more reliably as days lengthen, even before the weather warms.",
  "March is the farmer's true new year. Peas and spinach go in as soon as the ground can be worked. Watch for frost heave lifting perennial roots — tamp them back carefully. Turn the compost pile when temperatures allow. The first asparagus tips remind you that patience always has its reward.",
  "After the last frost, harden off tomato transplants you have been nursing indoors. Plant potatoes when the soil crumbles easily. Set out onion sets and transplant broccoli and cabbage. Thin the carrots and beets ruthlessly — crowded rows never yield well. Keep a planting record; memory is more imperfect than it seems.",
  "May fills the garden with possibility and danger in equal measure. After the final frost, set out tomatoes, peppers, and squash. Pinch the herbs to keep them bushy. Pick strawberries every morning or the birds will do it for you. The first asparagus harvest makes every cold morning worthwhile.",
  "June demands daily attention. Weed before weeds set seed. Hill the potatoes twice before they bloom. Harvest garlic scapes promptly. Dry the first herbs before they flower. The solstice arrives — days will only shorten from here. Enjoy the long evenings while they last; they will not stay.",
  "July heat tests crop and farmer alike. Water deeply but infrequently to encourage deep roots. Harvest garlic when the lower leaves yellow. Pick beans every two days — leave them and they stop producing. Zucchini must be harvested young. Keep careful notes on what is thriving and what is not.",
  "August is the heart of harvest. Put up tomatoes, corn, beans, and peppers before the first frost threatens. Plant fall crops of spinach, lettuce, and radishes now — they need six weeks before hard frost. Order garlic for fall planting while selection remains good.",
  "September brings cooler nights and a second wind. Dig potatoes after the vines die back. Plant cover crops in empty beds. Divide and transplant perennials on overcast days. The first hard frost always arrives sooner than expected — keep an eye on the forecast and have row covers at hand.",
  "October calls for putting the garden to bed properly. Spread finished compost over all empty beds. Plant garlic cloves three inches deep, two weeks before the ground freezes. Bring in the last peppers and tomatoes before hard frost. Stack the fallen leaves — they will be gold for the compost pile in spring.",
  "November is for reflection and preparation in equal measure. Clean, dry, and oil the tools before storing them. Review what succeeded and what failed this season. Order seeds early. Check the root cellar weekly. The garden rests, but the good farmer never entirely does.",
  "December offers rest and its own deep satisfactions. The root cellar holds summer's labor in carrots, beets, and winter squash. Force paperwhite bulbs for winter cheer. Thumb through seed catalogs slowly by firelight. Plan generously. Begin again."
];

const holidays = {
  "1-1":"New Year's Day","2-14":"Valentine's Day","3-17":"St. Patrick's Day",
  "4-22":"Earth Day","5-1":"May Day","6-19":"Juneteenth",
  "7-4":"Independence Day","10-31":"Halloween","11-11":"Veterans Day",
  "12-24":"Christmas Eve","12-25":"Christmas Day","12-31":"New Year's Eve"
};

const seasonMarkers = [
  {month:2,day:20,label:"Spring Equinox"},
  {month:5,day:21,label:"Summer Solstice"},
  {month:8,day:22,label:"Autumnal Equinox"},
  {month:11,day:21,label:"Winter Solstice"}
];

// ── State ────────────────────────────────────────────────────
let tideStation = null, tideCache = {}, noaaStations = null;

// ── DOM ──────────────────────────────────────────────────────
const today = new Date();
const pagesEl     = document.getElementById("pages");
const yearInput   = document.getElementById("yearInput");
const monthSelect = document.getElementById("monthSelect");
const cityInput   = document.getElementById("cityInput");
const stationLabel= document.getElementById("stationLabel");
const tidesBtn    = document.getElementById("tidesBtn");

yearInput.value   = today.getFullYear();
monthSelect.value = today.getMonth();

document.getElementById("generateBtn").addEventListener("click", () => renderMonth(parseYear(), parseMon()));
document.getElementById("currentBtn").addEventListener("click", () => {
  yearInput.value = today.getFullYear(); monthSelect.value = today.getMonth();
  renderMonth(today.getFullYear(), today.getMonth());
});
document.getElementById("printBtn").addEventListener("click", () => window.print());
yearInput.addEventListener("keydown", e => { if(e.key==="Enter") renderMonth(parseYear(),parseMon()); });
monthSelect.addEventListener("change", () => renderMonth(parseYear(), parseMon()));
tidesBtn.addEventListener("click", () => findTidesForCity(cityInput.value.trim()));
cityInput.addEventListener("keydown", e => { if(e.key==="Enter") findTidesForCity(cityInput.value.trim()); });
document.getElementById("clearTidesBtn").addEventListener("click", () => {
  tideStation = null; tideCache = {};
  stationLabel.textContent = "No tide station set — set a location to show sun times & tides";
  renderMonth(parseYear(), parseMon());
});

function parseYear() {
  const y = Number.parseInt(yearInput.value, 10);
  if (Number.isNaN(y)||y<1||y>9999) { yearInput.value=today.getFullYear(); return today.getFullYear(); }
  return y;
}
function parseMon() { return Number.parseInt(monthSelect.value, 10); }

// ── Render ───────────────────────────────────────────────────
async function renderMonth(year, month) {
  pagesEl.innerHTML = "";
  let tides = null;
  if (tideStation) { try { tides = await fetchTides(tideStation.id, year, month); } catch(_){} }
  const lat = tideStation ? parseFloat(tideStation.lat) : null;
  const lon = tideStation ? parseFloat(tideStation.lng) : null;
  pagesEl.appendChild(buildSpread(year, month, tides, lat, lon));
  document.title = `Almanac — ${monthNames[month]} ${year}`;
}

// ── Spread ───────────────────────────────────────────────────
function buildSpread(year, month, tides, lat, lon) {
  const el = document.createElement("div");
  el.className = "almanac-spread";
  el.appendChild(buildTop(year, month, tides, lat, lon));
  el.appendChild(buildBottom(year, month, tides));
  return el;
}

// ── TOP SECTION ──────────────────────────────────────────────
function buildTop(year, month, tides, lat, lon) {
  const sec = document.createElement("div");
  sec.className = "alm-top";

  // Title
  const title = document.createElement("div");
  title.className = "alm-month-title";
  title.textContent = monthNames[month].toUpperCase();
  sec.appendChild(title);

  // Sky watch
  const sw = document.createElement("div");
  sw.className = "sky-watch-box";
  sw.innerHTML = `<span class="sky-label">Sky Watch:</span> ${skyWatch[month]}`;
  sec.appendChild(sw);

  // Moon phases bar
  const phases = principalPhases(year, month);
  const bar = document.createElement("div");
  bar.className = "moon-phases-bar";
  bar.innerHTML = phases.map(p =>
    `<span class="phase-item"><span class="ph-glyph">${p.glyph}</span> ${p.name} — ${p.day}${nth(p.day)}</span>`
  ).join("");
  sec.appendChild(bar);

  const note = document.createElement("p");
  note.className = "phase-note";
  note.textContent = lat
    ? `Sun times shown in approximate local time for ${tideStation.name}, ${tideStation.state||""}. Light = a.m. · Bold = p.m.`
    : "Enter a coastal city above to display local sunrise, sunset, and tide times.";
  sec.appendChild(note);

  // Astro table
  const wrap = document.createElement("div");
  wrap.className = "astro-wrap";
  wrap.appendChild(buildAstroTable(year, month, tides, lat, lon));
  sec.appendChild(wrap);

  return sec;
}

function buildAstroTable(year, month, tides, lat, lon) {
  const hasSun   = lat !== null;
  const hasTides = tides !== null;
  const days     = new Date(year, month+1, 0).getDate();
  const jan1     = new Date(year, 0, 1);

  const table = document.createElement("table");
  table.className = "astro-table";

  // Header
  let hdr = `<thead><tr>
    <th>D.Y.</th><th>#</th><th>Day</th>`;
  if (hasSun) hdr += `<th>☀ Rises<br>H.M.</th><th>☀ Sets<br>H.M.</th><th>Day<br>Length</th><th>Sun<br>Fast</th><th>Declination</th>`;
  if (hasTides) hdr += `<th>H. Tide</th><th>L. Tide</th>`;
  hdr += `<th>Moon</th><th>Age</th><th>Place</th></tr></thead>`;
  table.innerHTML = hdr;

  const tbody = document.createElement("tbody");

  for (let d = 1; d <= days; d++) {
    const date = new Date(year, month, d);
    const dow  = date.getDay();
    const dy   = Math.floor((date - jan1) / 86400000) + 1;
    const sun  = hasSun ? calcSun(year, month, d, lat, lon) : null;
    const moon = moonGlyph(date);
    const age  = moonAge(date);
    const cons = moonConst(date);

    let htTide = "—", ltTide = "—";
    if (hasTides && tides[d]) {
      const h = tides[d].find(e => e.type === "H");
      const l = tides[d].find(e => e.type === "L");
      if (h) htTide = h.time;
      if (l) ltTide = l.time;
    }

    const tr = document.createElement("tr");
    if (dow === 0) tr.classList.add("is-sunday");
    if (isToday(date)) tr.classList.add("is-today");

    let cells = `
      <td class="col-dy">${dy}</td>
      <td class="col-num">${d}</td>
      <td class="col-dow">${dow===0 ? "<b>D.</b>" : dayAbbr[dow]}</td>`;
    if (hasSun) cells += `
      <td>${sun.rise}</td>
      <td><b>${sun.set}</b></td>
      <td>${sun.dayLen}</td>
      <td>${sun.fast}</td>
      <td class="col-decl">${sun.decl}</td>`;
    if (hasTides) cells += `
      <td class="col-tide">${htTide}</td>
      <td class="col-tide">${ltTide}</td>`;
    cells += `
      <td class="col-moon" aria-label="${moon.label}">${moon.glyph}</td>
      <td>${age}</td>
      <td class="col-const">${cons}</td>`;

    tr.innerHTML = cells;
    tbody.appendChild(tr);
  }

  table.appendChild(tbody);
  return table;
}

// ── BOTTOM SECTION ───────────────────────────────────────────
function buildBottom(year, month, tides) {
  const sec = document.createElement("div");
  sec.className = "alm-bottom";

  const days = new Date(year, month+1, 0).getDate();

  // Header banner
  const hdr = document.createElement("div");
  hdr.className = "alm-bottom-header";
  hdr.innerHTML = `
    <span>The ${monthOrdinals[month]} Month · ${year}</span>
    <span class="bh-month">${monthNames[month].toUpperCase()}</span>
    <span>${monthNames[month].toUpperCase()} Hath ${days} Days</span>`;
  sec.appendChild(hdr);

  // Ornament + verse
  const orn = document.createElement("div");
  orn.className = "alm-ornament";
  orn.textContent = "— ✦ —";
  sec.appendChild(orn);

  const verse = document.createElement("div");
  verse.className = "alm-verse";
  verse.innerHTML = monthVerses[month].split("\n").join("<br>");
  sec.appendChild(verse);

  // Two columns
  const two = document.createElement("div");
  two.className = "alm-two-col";
  two.appendChild(buildDatesCol(year, month, tides));
  two.appendChild(buildFarmersCol(month));
  sec.appendChild(two);

  // Footer
  const foot = document.createElement("div");
  foot.className = "alm-footer";
  foot.innerHTML = `<span>${year}</span>
    <span>${tideStation ? "Tides: "+tideStation.name : "No tide station set"}</span>
    <span>${monthNames[month]} ${year}</span>`;
  sec.appendChild(foot);

  return sec;
}

function buildDatesCol(year, month, tides) {
  const col = document.createElement("div");

  const head = document.createElement("div");
  head.className = "dates-col-head";
  head.textContent = "Dates, Feasts, Fasts, Aspects, Tide Heights, and Weather";
  col.appendChild(head);

  const phaseDays = principalPhases(year, month);
  const days = new Date(year, month+1, 0).getDate();
  const table = document.createElement("table");
  table.className = "dates-table";
  const tbody = document.createElement("tbody");

  for (let d = 1; d <= days; d++) {
    const date = new Date(year, month, d);
    const dow  = date.getDay();

    const holiday = holidays[`${month+1}-${d}`] || "";
    const season  = seasonMarkers.find(s => s.month===month && s.day===d);
    const phase   = phaseDays.find(p => p.day===d);

    let evHtml = "";
    if (holiday) evHtml += `<span class="ev-holiday">${holiday}.</span> `;
    if (season)  evHtml += `<span class="ev-season">${season.label}.</span> `;
    if (phase)   evHtml += `<span class="ev-phase">${phase.glyph} ${phase.name}.</span> `;
    if (!evHtml) evHtml = dayNote(date);

    let tideHtml = "";
    if (tides && tides[d]) {
      const heights = tides[d].map(e => e.height + "′").join(" / ");
      tideHtml = `{${heights}}`;
    }

    const tr = document.createElement("tr");
    if (dow===0) tr.classList.add("dt-sunday");
    if (isToday(date)) tr.classList.add("dt-today");

    tr.innerHTML = `
      <td class="dt-num">${d}</td>
      <td class="dt-dow">${dow===0 ? "D." : dayAbbr[dow]}</td>
      <td class="dt-dot">·</td>
      <td class="dt-event">${evHtml}</td>
      <td class="dt-tide">${tideHtml}</td>`;
    tbody.appendChild(tr);
  }

  table.appendChild(tbody);
  col.appendChild(table);
  return col;
}

function buildFarmersCol(month) {
  const col = document.createElement("div");

  const head = document.createElement("div");
  head.className = "farmers-col-head";
  head.innerHTML = `Farmer's Calendar<br><span style="font-size:.85em;font-weight:normal;text-transform:none;letter-spacing:0;font-style:italic">${monthNames[month]}</span>`;
  col.appendChild(head);

  const text = document.createElement("div");
  text.className = "farmers-text";
  // Break into sentences for paragraph feel
  const sentences = farmersCalendar[month].split(". ").filter(s=>s.trim());
  const mid = Math.ceil(sentences.length / 2);
  const p1 = sentences.slice(0, mid).join(". ") + ".";
  const p2 = sentences.slice(mid).join(". ") + (sentences[sentences.length-1].endsWith(".") ? "" : ".");
  text.innerHTML = `<p>${p1}</p><p>${p2}</p>`;
  col.appendChild(text);

  return col;
}

// ── Moon ─────────────────────────────────────────────────────
function moonGlyph(date) {
  const p = moonPhase(date);
  if (p < 0.0625 || p >= 0.9375) return {glyph:"●", label:"New Moon"};
  if (p < 0.1875) return {glyph:"◔", label:"Waxing Crescent"};
  if (p < 0.3125) return {glyph:"◑", label:"First Quarter"};
  if (p < 0.4375) return {glyph:"◕", label:"Waxing Gibbous"};
  if (p < 0.5625) return {glyph:"○", label:"Full Moon"};
  if (p < 0.6875) return {glyph:"◖", label:"Waning Gibbous"};
  if (p < 0.8125) return {glyph:"◐", label:"Last Quarter"};
  return {glyph:"◗", label:"Waning Crescent"};
}
function moonPhase(date) {
  const ref = Date.UTC(2000,0,6,18,14,0), syn = 29.530588853;
  const d = (Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()) - ref) / 86400000;
  return ((d/syn)%1+1)%1;
}
function moonAge(date) { return Math.round(moonPhase(date)*29.530588853); }

function principalPhases(year, month) {
  const defs = [
    {glyph:"●",name:"New Moon",target:0},
    {glyph:"◑",name:"First Quarter",target:.25},
    {glyph:"○",name:"Full Moon",target:.5},
    {glyph:"◐",name:"Last Quarter",target:.75}
  ];
  const days = new Date(year,month+1,0).getDate();
  return defs.map(def => {
    let best=1, bd=Infinity;
    for (let d=1;d<=days;d++) {
      const dist = circDist(moonPhase(new Date(year,month,d)), def.target);
      if (dist<bd) {bd=dist; best=d;}
    }
    return {...def, day:best};
  });
}
function circDist(a,b) { const d=Math.abs(a-b); return Math.min(d,1-d); }

// ── Moon constellation ────────────────────────────────────────
function moonConst(date) {
  const D = jd(date.getFullYear(), date.getMonth(), date.getDate()) - 2451545;
  const L = ((218.316 + 13.176396*D) % 360 + 360) % 360;
  return ["ARI","TAU","GEM","CAN","LEO","VIR","LIB","SCO","SAG","CAP","AQU","PSC"][Math.floor(L/30)];
}

// ── Sun ───────────────────────────────────────────────────────
function calcSun(year, month, day, lat, lon) {
  const J  = jd(year, month, day);
  const T  = (J - 2451545) / 36525;
  const L0 = (280.46646 + 36000.76983*T + 0.0003032*T*T) % 360;
  const M  = 357.52911 + 35999.05029*T - 0.0001537*T*T;
  const Mr = M * Math.PI/180;
  const C  = (1.914602 - 0.004817*T - 0.000014*T*T)*Math.sin(Mr)
           + (0.019993 - 0.000101*T)*Math.sin(2*Mr)
           + 0.000289*Math.sin(3*Mr);
  const om = 125.04 - 1934.136*T;
  const lm = (L0+C) - 0.00569 - 0.00478*Math.sin(om*Math.PI/180);
  const e0 = 23 + 26/60 + 21.448/3600 - (46.815/3600)*T - (0.00059/3600)*T*T + (0.001813/3600)*T*T*T;
  const ep = (e0 + 0.00256*Math.cos(om*Math.PI/180)) * Math.PI/180;
  const decl = Math.asin(Math.sin(ep)*Math.sin(lm*Math.PI/180)) * 180/Math.PI;
  const y  = Math.tan(ep/2)**2;
  const L0r= L0*Math.PI/180, e=0.016708634;
  const eqT = 4*(180/Math.PI)*(y*Math.sin(2*L0r) - 2*e*Math.sin(Mr)
    + 4*e*y*Math.sin(Mr)*Math.cos(2*L0r) - 0.5*y*y*Math.sin(4*L0r) - 1.25*e*e*Math.sin(2*Mr));

  const latR = lat*Math.PI/180, declR = decl*Math.PI/180;
  const cosH = (Math.cos(90.833*Math.PI/180) - Math.sin(latR)*Math.sin(declR))
             / (Math.cos(latR)*Math.cos(declR));
  const d_str = fmtDecl(decl), f_str = String(Math.abs(Math.round(eqT)));
  if (cosH >  1) return {rise:"—", set:"—", dayLen:"—", decl:d_str, fast:f_str};
  if (cosH < -1) return {rise:"—", set:"—", dayLen:"24:00", decl:d_str, fast:f_str};

  const HA  = Math.acos(cosH)*180/Math.PI;
  const tzM = -Math.round(lon/15)*60;
  const noon = 720 - 4*lon - eqT + tzM;
  return {
    rise:   toHMM(noon - HA*4),
    set:    toHMM(noon + HA*4),
    dayLen: toHMM(HA*8),
    decl:   d_str,
    fast:   f_str
  };
}

function jd(year, month0, day) {
  let y=year, m=month0+1;
  if (m<=2){y--;m+=12;}
  const A=Math.floor(y/100), B=2-A+Math.floor(A/4);
  return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+day+B-1524.5;
}
function toHMM(mins) {
  mins=((mins%1440)+1440)%1440;
  let h=Math.floor(mins/60), m=Math.round(mins%60);
  if(m===60){m=0;h++;}
  return `${h}:${String(m).padStart(2,"0")}`;
}
function fmtDecl(decl) {
  const dir=decl>=0?"N":"S", abs=Math.abs(decl);
  const deg=Math.floor(abs), min=Math.round((abs-deg)*60);
  return `${deg}°${String(min).padStart(2,"0")}′${dir}`;
}

// ── Helpers ───────────────────────────────────────────────────
const dayNotes = [
  "Best for keeping records.","Watch the weather signs.",
  "A fair day for mending.","Good light for planning.",
  "Tend tools and stores.","Mind wind and rainfall.",
  "A fitting day for travel."
];
function dayNote(date) { return dayNotes[date.getDay()]; }
function nth(n) {
  if(n>=11&&n<=13) return "th";
  return ["th","st","nd","rd","th","th","th","th","th","th"][n%10];
}
function isToday(date) {
  return date.getFullYear()===today.getFullYear()
    && date.getMonth()===today.getMonth()
    && date.getDate()===today.getDate();
}

// ── Tide / location ───────────────────────────────────────────
async function findTidesForCity(city) {
  if (!city) return;
  stationLabel.textContent = "Searching…";
  tidesBtn.disabled = true;
  try {
    const geo = await geocode(city);
    if (!geo) { stationLabel.textContent = "City not found — try a different name."; return; }
    stationLabel.textContent = "Loading tide stations…";
    const stations = await loadStations();
    const st = nearest(geo.lat, geo.lon, stations);
    const km = Math.round(haversine(geo.lat,geo.lon,parseFloat(st.lat),parseFloat(st.lng)));
    tideStation = st; tideCache = {};
    const note = km>300 ? ` — ${km} km away, tides may not apply` : ` (${km} km)`;
    stationLabel.textContent = `${st.name}${st.state?", "+st.state:""}${note}`;
    await renderMonth(parseYear(), parseMon());
  } catch(err) {
    stationLabel.textContent = `Error: ${err.message}`;
  } finally { tidesBtn.disabled = false; }
}
async function geocode(city) {
  const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(city)}&format=json&limit=1`);
  const d = await r.json();
  return d.length ? {lat:parseFloat(d[0].lat), lon:parseFloat(d[0].lon)} : null;
}
async function loadStations() {
  if (noaaStations) return noaaStations;
  const r = await fetch("https://api.tidesandcurrents.noaa.gov/mdapi/prod/webapi/stations.json?type=tidepredictions");
  noaaStations = (await r.json()).stations;
  return noaaStations;
}
function nearest(lat,lon,stations) {
  let best=null,bd=Infinity;
  for(const s of stations){const d=haversine(lat,lon,parseFloat(s.lat),parseFloat(s.lng));if(d<bd){bd=d;best=s;}}
  return best;
}
function haversine(a,b,c,d) {
  const R=6371,dLat=(c-a)*Math.PI/180,dLon=(d-b)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
async function fetchTides(stationId, year, month) {
  const key=`${stationId}-${year}-${month}`;
  if(tideCache[key]) return tideCache[key];
  const pad=n=>String(n).padStart(2,"0");
  const last=new Date(year,month+1,0).getDate();
  const url=`https://api.tidesandcurrents.noaa.gov/api/prod/datagetter`
    +`?begin_date=${year}${pad(month+1)}01&end_date=${year}${pad(month+1)}${pad(last)}`
    +`&station=${stationId}&product=predictions&datum=MLLW&time_zone=lst_ldt`
    +`&interval=hilo&units=english&application=almanac&format=json`;
  const data = await (await fetch(url)).json();
  if (!data.predictions) return null;
  const byDay={};
  for(const p of data.predictions){
    const day=Number.parseInt(p.t.slice(8,10),10);
    if(!byDay[day]) byDay[day]=[];
    const [hStr,mStr]=p.t.slice(11,16).split(":");
    let h=Number.parseInt(hStr,10);
    const sfx=h>=12?"p":"a"; h=h%12||12;
    byDay[day].push({type:p.type, time:`${h}:${mStr}${sfx}`, height:parseFloat(p.v).toFixed(1)});
  }
  tideCache[key]=byDay;
  return byDay;
}

// ── Init ──────────────────────────────────────────────────────
renderMonth(today.getFullYear(), today.getMonth());
